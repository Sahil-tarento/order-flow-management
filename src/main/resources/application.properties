# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/orderflow
spring.datasource.username=orderflow_user
spring.datasource.password=orderflow_pass

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=orderflow-service

# Redis (Spring Boot 3.x uses spring.data.redis prefix)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Temporal
temporal.host=localhost
temporal.port=7233

# Actuator
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.root=INFO
logging.level.com.example.orderflowmanagement=DEBUG
